version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5432:5432"
    volumes:
      - temporal-postgres:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.28.2
    depends_on:
      - postgres
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
      - "8233:8233"

  worker:
    build: .
    depends_on:
      - temporal
    environment:
      TEMPORAL_TARGET: temporal:7233
      TEMPORAL_NAMESPACE: default
      LOG_LEVEL: INFO
    volumes:
      - ./shared:/shared
    command: ["python", "worker.py"]

  client:
    build: .
    depends_on:
      - temporal
      - worker
    environment:
      TEMPORAL_TARGET: temporal:7233
      TEMPORAL_NAMESPACE: default
      LOG_LEVEL: INFO
    volumes:
      - ./shared:/shared
    command: ["python", "client.py"]

  java-worker:
    build:
      context: ./java-cli
      dockerfile: Dockerfile
    depends_on:
      - temporal
    environment:
      TEMPORAL_TARGET: temporal:7233
    command: ["mvn", "exec:java", "-Dexec.mainClass=com.generated.temporal.worker.WorkerMain"]

  java-client:
    build:
      context: ./java-cli
      dockerfile: Dockerfile
    depends_on:
      - temporal
      - java-worker
    command: ["mvn", "exec:java", "-Dexec.mainClass=com.generated.temporal.client.DocumentIngestClientMain"]

volumes:
  temporal-postgres:
