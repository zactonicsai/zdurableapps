schema_version: "1.0.0"

metadata:
  name: "My Workflow Project"
  description: "Generated from Temporal Flow Builder"
  language:
    - python
  namespace: "default"
  default_task_queue: "my-workflow-project-queue"

types:
  - name: "DocumentRef"
    description: "Auto-generated stub — define in Type Manager"
    kind: struct
    fields:
      - name: data
        type: string
        required: true
        description: "Primary payload"

  - name: "ReviewResult"
    description: "Auto-generated stub — define in Type Manager"
    kind: struct
    fields:
      - name: data
        type: string
        required: true
        description: "Primary payload"

  - name: "TemplateData"
    description: "Auto-generated stub — define in Type Manager"
    kind: struct
    fields:
      - name: data
        type: string
        required: true
        description: "Primary payload"

  - name: "Document"
    description: "Auto-generated stub — define in Type Manager"
    kind: struct
    fields:
      - name: data
        type: string
        required: true
        description: "Primary payload"

retry_policies:
  - name: "default"
    initial_interval: "1s"
    backoff_coefficient: 2.0
    max_interval: "30s"
    max_attempts: 3
  - name: "aggressive"
    initial_interval: "500ms"
    backoff_coefficient: 1.5
    max_interval: "1m"
    max_attempts: 10

activities:
  - name: "review_document"
    description: "Read and review a document or file"
    mode: sync
    input:
      type: "DocumentRef"
      description: "Input for Review Document"
    output:
      type: "ReviewResult"
      description: "Output from Review Document"
    start_to_close_timeout: "30s"
    retry_policy: "default"

  - name: "fill_template"
    description: "Populate a document template with data"
    mode: sync
    input:
      type: "TemplateData"
      description: "Input for Fill Template"
    output:
      type: "Document"
      description: "Output from Fill Template"
    start_to_close_timeout: "30s"
    retry_policy: "default"

workflows:
  - name: "my_workflow_project_main_workflow"
    description: "Main workflow from canvas"
    mode: sync
    input:
      type: "DocumentRef"
      description: "Workflow input"
    output:
      type: "Document"
      description: "Workflow output"
    execution_timeout: "1h"
    retry_policy: "default"
    steps:
      - id: "step_1_review_document"
        description: "Read and review a document or file"
        kind: activity
        activity: "review_document"
        output_var: "review_document_result"

      - id: "step_2_fill_template"
        description: "Populate a document template with data"
        kind: activity
        activity: "fill_template"
        output_var: "fill_template_result"
        depends_on:
          - "step_1_review_document"

workers:
  - name: "my-workflow-project-worker"
    description: "Primary worker"
    task_queue: "my-workflow-project-queue"
    namespace: "default"
    activities:
      - "review_document"
      - "fill_template"
    workflows:
      - "my_workflow_project_main_workflow"
    max_concurrent_activities: 200
    max_concurrent_workflow_tasks: 200
    graceful_shutdown_timeout: "30s"

clients:
  - name: "my-workflow-project-client"
    description: "Default client"
    namespace: "default"
    target: "localhost:7233"
    tls:
      enabled: false
    allowed_workflows:
      - "my_workflow_project_main_workflow"
    default_mode: sync
    rpc_timeout: "30s"
    data_converter:
      encoding: json

observability:
  metrics:
    enabled: true
    exporter: prometheus
    endpoint: "localhost:9090"
    prefix: "my_workflow_project"
  tracing:
    enabled: true
    exporter: otlp
    endpoint: "localhost:4317"
    sample_rate: 1.0
  logging:
    level: info
    format: json
    output: stdout
